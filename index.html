<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bart Bikes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* FUNDO */
body{
background: url("img/img/bart-simpson-the-3840x2160-9413.png");
background-size: cover;
background-position: center;
font-family: Arial;
color: white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD */
.profile{
background: rgba(0,0,0,0.6);
backdrop-filter: blur(10px);
padding:30px;
border-radius:15px;
text-align:center;
width:300px;
transition:0.3s;
}

/* IMAGEM */
.profile img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
transition:0.3s;
box-shadow: 0 0 20px rgba(255,140,0,0.5);
}

.profile img:hover{
transform:scale(1.1);
box-shadow: 0 0 30px rgba(255,140,0,0.9);
}

/* TITULO */
.profile h2{
margin:15px 0 5px;
}

/* POEMA */
.profile p{
font-size:14px;
color:#ccc;
}

/* BOTÕES */
.buttons{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.btn{
position:relative;
padding:12px;
border-radius:10px;
background: rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
color:white;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
background: rgba(255,140,0,0.3);
transform:scale(1.05);
}

/* TOOLTIP */
.btn::after{
content: attr(data-tooltip);
position:absolute;
bottom:120%;
left:50%;
transform:translateX(-50%);
background: rgba(0,0,0,0.8);
padding:5px 10px;
border-radius:5px;
font-size:12px;
opacity:0;
pointer-events:none;
transition:0.3s;
white-space:nowrap;
}

.btn:hover::after{
opacity:1;
}

/* EFEITO 3D */
.card{
transition: transform 0.2s;
}

</style>
</head>

<body>

<div class="profile card" id="card">

<img src="img/img/504214096_18058159586242148_9078322962420434624_n.jpg">

<h2>Bart Bikes</h2>

<p>
Nas ruas acelera, sem medo de cair,<br>
Bart Bikes na pista, nasceu pra evoluir 🚴‍♂️🔥
</p>

<div class="buttons">

<a href="https://wa.me/5516988482780" class="btn" data-tooltip="Falar no WhatsApp">
<i class="fab fa-whatsapp"></i> WhatsApp
</a>

<a href="https://instagram.com/BAART_BIKES" class="btn" data-tooltip="Ver Instagram">
<i class="fab fa-instagram"></i> Instagram
</a>

<a href="mailto:BART.SIMP@GMAIL.COM" class="btn" data-tooltip="Enviar Email">
<i class="fas fa-envelope"></i> Email
</a>

<a href="https://maps.google.com/?q=Rua São Francisco, 176B" class="btn" data-tooltip="Ver localização">
<i class="fas fa-map-marker-alt"></i> Endereço
</a>

<a href="https://www.bartbike.com.br" class="btn" data-tooltip="Abrir site">
<i class="fas fa-globe"></i> Site
</a>

</div>

</div>

<script>
const card = document.getElementById("card");

card.addEventListener('mousemove', function(e) {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    const xAxis = (x - centerX) / 25;
    const yAxis = -(y - centerY) / 25;

    card.style.transform = `
        perspective(600px)
        rotateX(${yAxis}deg)
        rotateY(${xAxis}deg)
    `;
});

card.addEventListener('mouseleave', function() {
    card.style.transform = 'perspective(600px) rotateX(0) rotateY(0)';
});
</script>

</body>
</html>
