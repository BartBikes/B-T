<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bart Bikes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:url("media/backgroundFF.png") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD */
.profile{
background: rgba(0,0,0,0.5);
padding:25px;
border-radius:15px;
text-align:center;
width:300px;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

/* FOTO */
.profile img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
box-shadow:0 0 15px rgba(255,140,0,0.5);
transition:0.2s;
}

.profile img:hover{
transform:scale(1.05);
}

/* TEXTO */
.profile p{
font-size:13px;
color:#ccc;
margin:10px 0;
}

/* BOTÕES */
.buttons{
margin-top:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
padding:10px;
border-radius:8px;
background: rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
color:white;
text-decoration:none;
transition:0.2s;
position:relative;
}

.btn:hover{
background: rgba(255,140,0,0.25);
}

/* TOOLTIP */
.btn::after{
content: attr(data-tooltip);
position:absolute;
bottom:120%;
left:50%;
transform:translateX(-50%);
background: rgba(0,0,0,0.8);
padding:5px 8px;
border-radius:5px;
font-size:11px;
opacity:0;
pointer-events:none;
transition:0.2s;
white-space:nowrap;
}

.btn:hover::after{
opacity:1;
}

</style>
</head>

<body>

<div class="profile">

<img src="media/profileFF.jpg">

<h2>Bart Bikes</h2>

<p>
🛠️ Especialistas em performance e segurança para o seu pedal.<br>
📍 Manutenção de bikes em Franca-SP.<br>
👇 Agende a sua revisão pelo WhatsApp:
</p>

<div class="buttons">

<!-- 1 - WHATSAPP (PRINCIPAL) -->
<a href="https://wa.me/5516988482780" class="btn" data-tooltip="Falar no WhatsApp">
<i class="fab fa-whatsapp"></i> WhatsApp
</a>

<!-- 2 - INSTAGRAM -->
<a href="https://instagram.com/BAART_BIKES" class="btn" data-tooltip="Ver Instagram">
<i class="fab fa-instagram"></i> Instagram
</a>

<!-- 3 - FACEBOOK -->
<a href="https://www.facebook.com/willian.aragao.733/" class="btn" data-tooltip="Abrir Facebook">
<i class="fab fa-facebook"></i> Facebook
</a>

<!-- 4 - LOJA -->
<a href="https://bartbike.lojavirtualnuvem.com.br/?utm_source=ig&utm_medium=social&utm_content=link_in_bio" class="btn" data-tooltip="Abrir loja online">
<i class="fas fa-store"></i> Loja Online
</a>

<!-- 5 - ENDEREÇO -->
<a href="https://maps.google.com/?q=Rua São Francisco, 176B" class="btn" data-tooltip="Abrir localização">
<i class="fas fa-map-marker-alt"></i> Endereço
</a>

<!-- 6 - EMAIL -->
<a href="mailto:BART.SIMP@GMAIL.COM" class="btn" data-tooltip="Enviar Email">
<i class="fas fa-envelope"></i> Email
</a>



</div>

</div>

</body>
</html>
