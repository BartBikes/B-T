<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bart Bikes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:url("media/backgroundFF.png") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD MAIS LEVE */
.profile{
background: rgba(0,0,0,0.5); /* menos pesado */
padding:25px;
border-radius:15px;
text-align:center;
width:300px;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

/* FOTO */
.profile img{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
box-shadow:0 0 15px rgba(255,140,0,0.5);
transition:0.2s;
}

.profile img:hover{
transform:scale(1.05);
}

/* BOTÕES */
.buttons{
margin-top:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
padding:10px;
border-radius:8px;
background: rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
color:white;
text-decoration:none;
transition:0.2s;
}

.btn:hover{
background: rgba(255,140,0,0.25);
}

/* BOTÃO SOM MAIS LEVE */
.music-btn{
position:fixed;
bottom:15px;
right:15px;
width:50px;
height:50px;
border-radius:50%;
background: rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.2);
transition:0.2s;
}

.music-btn:hover{
background: rgba(255,140,0,0.4);
}

</style>
</head>

<body>

<audio id="bg-music" loop autoplay>
<source src="media/som de fundo.mp3" type="audio/mpeg">
</audio>

<div class="music-btn" id="musicBtn">
<i class="fas fa-volume-up"></i>
</div>

<div class="profile">

<img src="media/profileFF.jpg">

<h2>Bart Bikes</h2>

<p style="font-size:13px;color:#ccc;">
Nas ruas acelera, sem medo de cair,<br>
Bart Bikes na pista, nasceu pra evoluir 🚴🔥
</p>

<div class="buttons">

<a href="https://wa.me/5516988482780" class="btn">
<i class="fab fa-whatsapp"></i> WhatsApp
</a>

<a href="https://instagram.com/BAART_BIKES" class="btn">
<i class="fab fa-instagram"></i> Instagram
</a>

<a href="mailto:BART.SIMP@GMAIL.COM" class="btn">
<i class="fas fa-envelope"></i> Email
</a>

<a href="https://maps.google.com/?q=Rua São Francisco, 176B" class="btn">
<i class="fas fa-map-marker-alt"></i> Endereço
</a>

<a href="https://www.bartbike.com.br" class="btn">
<i class="fas fa-globe"></i> Site
</a>

</div>

</div>

<script>

const music = document.getElementById("bg-music");
const btn = document.getElementById("musicBtn");

let started = false;

// tenta autoplay (pc)
window.onload = () => {
    music.volume = 0.4;
    music.play().catch(()=>{});
};

// celular ativa no toque
document.addEventListener("click", () => {
    if(!started){
        music.play();
        started = true;
    }
}, { once:true });

// botão
btn.onclick = (e) => {
    e.stopPropagation();

    if(music.paused){
        music.play();
        btn.innerHTML = '<i class="fas fa-volume-up"></i>';
    } else {
        music.pause();
        btn.innerHTML = '<i class="fas fa-volume-mute"></i>';
    }
};

</script>

</body>
</html>
