<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bart Bikes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
color:white;

/* FUNDO CORRETO */
background:url("media/backgroundFF.png");
background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD */
.profile{
background: rgba(0,0,0,0.6);
backdrop-filter: blur(12px);
padding:30px;
border-radius:20px;
text-align:center;
width:320px;
transition:0.3s;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* FOTO */
.profile img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
box-shadow:0 0 25px rgba(255,140,0,0.6);
transition:0.3s;
}

.profile img:hover{
transform:scale(1.1);
box-shadow:0 0 40px rgba(255,140,0,1);
}

/* TEXTO */
.profile p{
font-size:14px;
color:#ccc;
}

/* BOTÕES */
.buttons{
margin-top:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:12px;
border-radius:10px;
background: rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
color:white;
text-decoration:none;
transition:0.3s;
position:relative;
}

/* HOVER LARANJA */
.btn:hover{
background: rgba(255,140,0,0.3);
transform:scale(1.05);
}

/* TOOLTIP */
.btn::after{
content: attr(data-tooltip);
position:absolute;
bottom:120%;
left:50%;
transform:translateX(-50%);
background: rgba(0,0,0,0.8);
padding:6px 10px;
border-radius:5px;
font-size:12px;
opacity:0;
transition:0.3s;
}

.btn:hover::after{
opacity:1;
}

</style>
</head>

<body>

<div class="profile">

<!-- FOTO CORRETA -->
<img src="media/profileFF.jpg">

<h2>Bart Bikes</h2>

<p>
Nas ruas acelera, sem medo de cair,<br>
Bart Bikes na pista, nasceu pra evoluir 🚴🔥
</p>

<div class="buttons">

<a href="https://wa.me/5516988482780" class="btn" data-tooltip="Falar no WhatsApp">
<i class="fab fa-whatsapp"></i> WhatsApp
</a>

<a href="https://instagram.com/BAART_BIKES" class="btn" data-tooltip="Ver Instagram">
<i class="fab fa-instagram"></i> Instagram
</a>

<a href="mailto:BART.SIMP@GMAIL.COM" class="btn" data-tooltip="Enviar Email">
<i class="fas fa-envelope"></i> Email
</a>

<a href="https://maps.google.com/?q=Rua São Francisco, 176B" class="btn" data-tooltip="Ver localização">
<i class="fas fa-map-marker-alt"></i> Endereço
</a>

<a href="https://www.bartbike.com.br" class="btn" data-tooltip="Abrir site">
<i class="fas fa-globe"></i> Site
</a>

</div>

</div>

</body>
</html>
