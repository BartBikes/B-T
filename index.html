<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bart Bikes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:url("media/backgroundFF.png");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD */
.profile{
background: rgba(0,0,0,0.6);
backdrop-filter: blur(12px);
padding:30px;
border-radius:20px;
text-align:center;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* FOTO */
.profile img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
box-shadow:0 0 25px rgba(255,140,0,0.6);
transition:0.3s;
}

.profile img:hover{
transform:scale(1.1);
box-shadow:0 0 40px rgba(255,140,0,1);
}

/* BOTÕES */
.buttons{
margin-top:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:12px;
border-radius:10px;
background: rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
color:white;
text-decoration:none;
transition:0.3s;
position:relative;
}

.btn:hover{
background: rgba(255,140,0,0.3);
transform:scale(1.05);
}

/* BOTÃO DE SOM */
.music-btn{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background: rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.2);
transition:0.3s;
animation:pulse 2s infinite;
}

.music-btn:hover{
background: rgba(255,140,0,0.4);
transform:scale(1.1);
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(255,140,0,0.6);}
70%{box-shadow:0 0 0 15px rgba(255,140,0,0);}
100%{box-shadow:0 0 0 0 rgba(255,140,0,0);}
}

</style>
</head>

<body>

<!-- AUDIO -->
<audio id="bg-music" loop autoplay>
<source src="media/som de fundo.mp3" type="audio/mpeg">
</audio>

<!-- BOTÃO -->
<div class="music-btn" id="musicBtn">
<i class="fas fa-volume-up"></i>
</div>

<div class="profile">

<img src="media/profileFF.jpg">

<h2>Bart Bikes</h2>

<p>
Nas ruas acelera, sem medo de cair,<br>
Bart Bikes na pista, nasceu pra evoluir 🚴🔥
</p>

<div class="buttons">

<a href="https://wa.me/5516988482780" class="btn">
<i class="fab fa-whatsapp"></i> WhatsApp
</a>

<a href="https://instagram.com/BAART_BIKES" class="btn">
<i class="fab fa-instagram"></i> Instagram
</a>

<a href="mailto:BART.SIMP@GMAIL.COM" class="btn">
<i class="fas fa-envelope"></i> Email
</a>

<a href="https://maps.google.com/?q=Rua São Francisco, 176B" class="btn">
<i class="fas fa-map-marker-alt"></i> Endereço
</a>

<a href="https://www.bartbike.com.br" class="btn">
<i class="fas fa-globe"></i> Site
</a>

</div>

</div>

<script>

const music = document.getElementById("bg-music");
const btn = document.getElementById("musicBtn");

let volume = 0;
music.volume = 0;

// FADE IN AUTOMÁTICO
function fadeIn(){
    let fade = setInterval(() => {
        if(volume < 0.5){
            volume += 0.02;
            music.volume = volume;
        } else {
            clearInterval(fade);
        }
    }, 100);
}

// TENTAR AUTO PLAY
window.addEventListener("load", () => {
    music.play().then(() => {
        fadeIn();
    }).catch(() => {
        // celular bloqueia → espera clique
    });
});

// CLIQUE (CELULAR FUNCIONA)
btn.addEventListener("click", () => {
    if(music.paused){
        music.play();
        fadeIn();
        btn.innerHTML = '<i class="fas fa-volume-up"></i>';
    } else {
        music.pause();
        btn.innerHTML = '<i class="fas fa-volume-mute"></i>';
    }
});

</script>

</body>
</html>
